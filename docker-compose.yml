services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: typeprose
      POSTGRES_PASSWORD: typeprose
      POSTGRES_DB: typeprose
    ports:
      - '5432:5432'
    volumes:
      - typeprose-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U typeprose -d typeprose']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  typeprose-pgdata:
