name: CI

# CI order per plan §11: lint → typecheck → unit → integration (Postgres
# service) → e2e (Playwright smoke). Jobs are chained with `needs` so they run
# as an ordered pipeline. Node is pinned to 24 (the project baseline; the api
# and ingest scripts rely on native type stripping).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.7.0'
  DATABASE_URL: postgres://typeprose:typeprose@localhost:5432/typeprose
  CORS_ORIGIN: http://localhost:5173

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typeprose
          POSTGRES_PASSWORD: typeprose
          POSTGRES_DB: typeprose
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typeprose -d typeprose"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Migrate so the integration suite (which self-seeds) has its schema.
      - run: pnpm --filter api db:migrate
      # Unit tests everywhere + the api integration suite (DATABASE_URL present).
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typeprose
          POSTGRES_PASSWORD: typeprose
          POSTGRES_DB: typeprose
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typeprose -d typeprose"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:migrate
      # The smoke needs real passages to type.
      - run: pnpm ingest
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
