# Production stack (Phase 3 deployment hardening, plan §12): Postgres with a
# named volume, a one-shot migration step, the Fastify API, the static web
# behind Caddy, and a nightly pg_dump backup. Build context is the repo root.
#
#   cp deploy/.env.example deploy/.env   # then edit secrets
#   docker compose -f deploy/docker-compose.yml up -d --build
name: prosetype

services:
  postgres:
    image: postgres:16-alpine
    env_file: [.env]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: apply Drizzle migrations, then exit. The API waits for it.
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ['pnpm', '--filter', 'api', 'db:migrate']
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - api
    restart: unless-stopped

  # Nightly pg_dump to the backups volume; keeps the last 14 days.
  db-backup:
    image: postgres:16-alpine
    env_file: [.env]
    volumes:
      - backups:/backups
    entrypoint:
      - sh
      - -c
      - >
        while true; do
          pg_dump "$DATABASE_URL" | gzip > "/backups/typeprose-$(date +%Y%m%d-%H%M%S).sql.gz";
          find /backups -name '*.sql.gz' -mtime +14 -delete;
          sleep 86400;
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  backups:
