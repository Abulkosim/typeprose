<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Canonical/social URLs use the deploy placeholder host
      (deploy/.env.example: prosetype.example.com). Replace with the real
      domain when one is chosen (see DECISIONS.md, and plan §13.1 naming).
    -->
    <title>prosetype — type the classics</title>
    <meta
      name="description"
      content="A typing practice app built on public-domain literary prose — Dostoevsky, Nietzsche, Woolf, Hammett — with Monkeytype-grade WPM, accuracy, and consistency, plus a per-word hesitation heatmap."
    />
    <link rel="canonical" href="https://prosetype.example.com/" />
    <meta name="author" content="prosetype" />
    <meta
      name="keywords"
      content="typing test, typing practice, prose, literature, public domain, Monkeytype, WPM, words per minute, typing speed, hesitation heatmap, classic literature"
    />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Theme: noir by default, matinee (light) available; expose both. -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#12100e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#efe9db" media="(prefers-color-scheme: light)" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-96x96.png" type="image/png" sizes="96x96" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="prosetype" />
    <meta property="og:title" content="prosetype — type the classics" />
    <meta
      property="og:description"
      content="Type curated public-domain literary prose with Monkeytype-grade stats and a per-word hesitation heatmap."
    />
    <meta property="og:url" content="https://prosetype.example.com/" />
    <meta property="og:image" content="https://prosetype.example.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="prosetype — type the classics" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="prosetype — type the classics" />
    <meta
      name="twitter:description"
      content="Type curated public-domain literary prose with Monkeytype-grade stats and a per-word hesitation heatmap."
    />
    <meta name="twitter:image" content="https://prosetype.example.com/og-image.png" />
    <meta name="twitter:image:alt" content="prosetype — type the classics" />

    <!-- iOS web-app niceties -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="prosetype" />

    <!-- Structured data: a typing-practice web app -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "prosetype",
        "url": "https://prosetype.example.com/",
        "description": "A typing practice app built on public-domain literary prose, with Monkeytype-grade stats and a per-word hesitation heatmap.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and a modern browser",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
